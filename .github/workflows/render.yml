name: Render Video

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'project.tsx'
      - 'render.mjs'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm install

      - name: Create FFmpeg symlinks
        run: |
          # Create symlinks AFTER npm install so they don't get overwritten
          mkdir -p node_modules/@ffmpeg-installer/linux-x64
          ln -sf /usr/bin/ffmpeg node_modules/@ffmpeg-installer/linux-x64/ffmpeg
          mkdir -p node_modules/@ffprobe-installer/linux-x64
          ln -sf /usr/bin/ffprobe node_modules/@ffprobe-installer/linux-x64/ffprobe
          # Verify
          ls -la node_modules/@ffmpeg-installer/linux-x64/
          ls -la node_modules/@ffprobe-installer/linux-x64/

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Render video
        run: node render.mjs
        env:
          NODE_ENV: development

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: mercury-hub-video-${{ github.run_id }}
          path: output/mercury-hub.mp4
          retention-days: 30
