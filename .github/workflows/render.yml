name: Render Video

on:
  push:
    branches: [master, main]
    paths:
      - 'src/**'
      - 'project.tsx'
      - 'render.mjs'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: npm install

      - name: Setup FFmpeg and FFprobe
        run: |
          # Setup FFmpeg
          mkdir -p node_modules/@ffmpeg-installer/linux-x64
          cp /usr/bin/ffmpeg node_modules/@ffmpeg-installer/linux-x64/ffmpeg
          echo '{"name":"linux-x64","version":"1.0.0","description":"FFmpeg binary"}' > node_modules/@ffmpeg-installer/linux-x64/package.json
          chmod +x node_modules/@ffmpeg-installer/linux-x64/ffmpeg
          
          # Setup FFprobe
          mkdir -p node_modules/@ffprobe-installer/linux-x64
          cp /usr/bin/ffprobe node_modules/@ffprobe-installer/linux-x64/ffprobe
          echo '{"name":"linux-x64","version":"1.0.0","description":"FFprobe binary"}' > node_modules/@ffprobe-installer/linux-x64/package.json
          chmod +x node_modules/@ffprobe-installer/linux-x64/ffprobe
          
          # Verify
          node_modules/@ffmpeg-installer/linux-x64/ffmpeg -version | head -1
          node_modules/@ffprobe-installer/linux-x64/ffprobe -version | head -1

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Render video
        run: node render.mjs
        env:
          NODE_ENV: development

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        with:
          name: mercury-hub-video-${{ github.run_id }}
          path: output/mercury-hub.mp4
          retention-days: 30
